# ==============================
# SERVER CONFIG
# ==============================
server.port=8080

# ==============================
# AIVEN MYSQL CONFIG
# Database dang dung: otolegia_demo
# Luu y: thay MAT_KHAU_AIVEN_CUA_BAN bang password that tren Aiven
# ==============================
spring.datasource.url=jdbc:mysql://mysql-148f4d0d-thungo3011-4212.f.aivencloud.com:23095/otolegia_demo?sslMode=REQUIRED&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh&useUnicode=true&characterEncoding=utf8
spring.datasource.username=avnadmin
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==============================
# JPA / HIBERNATE CONFIG
# none = khong tu tao/sua bang, vi da tao DB bang file SQL truoc
# ==============================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ==============================
# JACKSON TIMEZONE
# ==============================
spring.jackson.time-zone=Asia/Ho_Chi_Minh
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss

# ==============================
# LOG CONFIG
# Hien thi SQL va loi ket noi ro hon khi debug
# ==============================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.level.com.zaxxer.hikari=INFO
